<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weather.gov — Prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#0050d8;--blue-dark:#002868;--green:#1a9850;
  --yellow:#f5a623;--orange:#e66000;--red:#e52207;
  --bg:#0d1117;--card:#161b22;--card2:#1c2430;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1b1b1b;}

/* ─── HEADER ─── */
header{
  background:var(--blue-dark);color:#fff;
  padding:0 20px;display:flex;align-items:center;
  justify-content:space-between;height:50px;
  box-shadow:0 2px 8px rgba(0,0,0,.35);position:relative;z-index:900;
}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;}
.logo-pulse{width:8px;height:8px;border-radius:50%;background:#4fc3f7;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.proto{background:rgba(229,34,7,.85);font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.5px;}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.12);border-radius:6px;padding:3px;}
.tab{
  padding:5px 16px;border:none;border-radius:4px;cursor:pointer;
  font-size:13px;font-weight:600;color:rgba(255,255,255,.65);
  background:transparent;transition:all .15s;white-space:nowrap;
}
.tab.on{background:#fff;color:var(--blue-dark);}
.tab:not(.on):hover{background:rgba(255,255,255,.18);color:#fff;}

/* ─── LAYOUT ─── */
.shell{display:flex;height:calc(100vh - 50px);}
.sidebar{width:340px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;background:#fff;border-right:1px solid #dde1e7;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:4px;}
.map-area{flex:1;position:relative;min-width:0;}
#map{width:100%;height:100%;}

/* ─── PRO MODE ─── */
.pro .sidebar{background:var(--bg);border-right-color:var(--border);}
.pro .sidebar::-webkit-scrollbar-thumb{background:var(--border);}

/* ─── MAP OVERLAYS ─── */
.map-legend{
  position:absolute;bottom:20px;left:12px;z-index:500;
  background:rgba(255,255,255,.95);border-radius:8px;
  padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);
  font-size:12px;min-width:150px;
}
.pro .map-legend{background:rgba(22,27,34,.95);color:var(--text);}
.legend-title{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-bottom:7px;}
.pro .legend-title{color:var(--muted);}
.legend-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;}
.swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

.map-layers{
  position:absolute;top:12px;right:12px;z-index:500;
  background:rgba(255,255,255,.95);border-radius:8px;
  padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.15);
  font-size:12px;
}
.pro .map-layers{background:rgba(22,27,34,.95);color:var(--text);}
.layer-title{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#777;margin-bottom:7px;}
.pro .layer-title{color:var(--muted);}
.layer-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;font-size:12px;}
.layer-row:last-child{margin:0;}
.layer-row input{cursor:pointer;accent-color:var(--blue);}

/* ─── PUBLIC VIEW ─── */
.pub-hero{
  padding:16px 18px 14px;
  background:linear-gradient(150deg,#1a4fba,#0d2e6e);color:#fff;
}
.pub-loc{font-size:20px;font-weight:800;}
.pub-loc-sub{font-size:12px;opacity:.7;margin-top:2px;}
.pub-updated{font-size:11px;opacity:.5;margin-top:5px;}

.impact-card{margin:12px;border-radius:10px;padding:14px 16px;}
.ic-none{background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20;}
.ic-low{background:#e3f2fd;border:1px solid #90caf9;color:#0d47a1;}
.ic-moderate{background:#fff8e1;border:1px solid #ffcc80;color:#b45309;}
.ic-high{background:#fce4ec;border:1px solid #f48fb1;color:#880e4f;}
.ic-icon{font-size:22px;margin-bottom:4px;}
.ic-main{font-size:15px;font-weight:700;line-height:1.4;}
.ic-sub{font-size:12px;margin-top:5px;opacity:.85;font-weight:400;}

.sec-label{
  padding:10px 18px 5px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;color:#888;
}

/* 8-hour timeline */
.timeline{margin:0 12px 12px;display:flex;border-radius:8px;overflow:hidden;height:52px;}
.tl-seg{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;font-size:9px;gap:3px;cursor:default;
  transition:filter .15s;
}
.tl-seg:hover{filter:brightness(1.08);}
.tl-time{font-size:9px;opacity:.85;}
.tl-pop{font-size:12px;font-weight:800;}

/* Forecast cards */
.fc-list{padding:0 12px 16px;display:flex;flex-direction:column;gap:8px;}
.fc{
  border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px;
  cursor:default;transition:border-color .15s;
}
.fc:hover{border-color:#bfcfe8;}
.fc.fc-rain{border-left:3px solid #0050d8;}
.fc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.fc-name{font-size:14px;font-weight:700;}
.chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.chip-none{background:#e8f5e9;color:#166534;}
.chip-low{background:#dbeafe;color:#1e40af;}
.chip-moderate{background:#fef3c7;color:#92400e;}
.chip-high{background:#fce7f3;color:#831843;}
.fc-short{font-size:13px;color:#444;margin-bottom:8px;}
.fc-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fc-bar-label{font-size:11px;color:#666;width:72px;flex-shrink:0;}
.bar-track{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.fc-bar-val{font-size:11px;font-weight:700;min-width:28px;text-align:right;}
.fc-action{
  font-size:12px;background:#eff6ff;color:#1d4ed8;
  border-radius:6px;padding:7px 10px;line-height:1.5;
}

/* Alert banner */
.alert-banner{
  margin:0 12px 10px;border-radius:8px;padding:11px 14px;
  font-size:13px;font-weight:700;
}
.ab-watch{background:#fff3cd;border-left:3px solid #f5a623;color:#92400e;}
.ab-warning{background:#fce4ec;border-left:3px solid #e52207;color:#880e4f;}

/* ─── PRO VIEW ─── */
.pro-header{
  padding:14px 18px;
  background:linear-gradient(135deg,#0d1b2a,#112240);
  border-bottom:1px solid var(--border);
}
.pro-loc{font-size:16px;font-weight:800;color:var(--text);}
.pro-loc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pro-wfo{
  display:inline-block;font-family:monospace;font-size:11px;
  background:rgba(79,195,247,.15);color:#4fc3f7;
  padding:2px 6px;border-radius:3px;margin-top:6px;
}

.ai-block{
  margin:10px 12px;
  background:linear-gradient(135deg,rgba(79,195,247,.08),rgba(79,195,247,.03));
  border:1px solid rgba(79,195,247,.25);border-radius:8px;padding:12px 14px;
}
.ai-header{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:#4fc3f7;margin-bottom:8px;
  display:flex;align-items:center;gap:7px;
}
.nim-badge{
  background:rgba(79,195,247,.15);color:#4fc3f7;
  padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;
}
.ai-text{font-size:13px;color:var(--text);line-height:1.7;}

.threat-list{padding:0 12px;display:flex;flex-direction:column;gap:7px;margin-bottom:4px;}
.threat{
  background:var(--card2);border:1px solid var(--border);
  border-radius:8px;padding:11px 13px;
}
.threat.t-high{border-left:3px solid var(--red);}
.threat.t-mod{border-left:3px solid var(--yellow);}
.threat.t-low{border-left:3px solid #4fc3f7;}
.threat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.threat-name{font-size:13px;font-weight:700;color:var(--text);}
.threat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px;}
.tb-watch{background:rgba(245,166,35,.2);color:#f5a623;border:1px solid rgba(245,166,35,.3);}
.tb-adv{background:rgba(79,195,247,.15);color:#4fc3f7;border:1px solid rgba(79,195,247,.3);}
.tb-ok{background:rgba(139,148,158,.12);color:var(--muted);border:1px solid var(--border);}
.threat-detail{font-size:12px;color:var(--muted);line-height:1.5;}
.threat-impact{font-size:12px;color:#f5a623;margin-top:4px;font-weight:600;}

/* Prob table */
.prob-wrap{padding:0 12px 12px;overflow-x:auto;}
.prob-table{width:100%;border-collapse:collapse;font-size:12px;}
.prob-table th{
  background:var(--card);padding:7px 10px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--muted);
  border-bottom:1px solid var(--border);
}
.prob-table td{
  padding:7px 10px;border-bottom:1px solid rgba(48,54,61,.5);
  color:var(--text);vertical-align:middle;
}
.prob-table tr:hover td{background:rgba(255,255,255,.02);}
.pop-cell{display:flex;align-items:center;gap:7px;}
.pop-track{width:50px;height:5px;background:#30363d;border-radius:3px;overflow:hidden;flex-shrink:0;}
.pop-bar{height:100%;border-radius:3px;}
.pop-val{font-weight:700;min-width:28px;}
.conf{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;}
.ch{background:rgba(0,169,28,.2);color:#4caf50;}
.cm{background:rgba(245,166,35,.2);color:#f5a623;}
.cl{background:rgba(229,34,7,.2);color:#ef5350;}

/* Actions */
.actions-wrap{padding:0 12px 16px;display:flex;flex-direction:column;gap:6px;}
.action{
  display:flex;align-items:flex-start;gap:9px;
  background:var(--card2);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;
}
.action-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ad-high{background:var(--red);}
.ad-mod{background:var(--yellow);}
.ad-low{background:#4fc3f7;}
.action-body{font-size:12px;color:var(--text);line-height:1.5;}
.action-time{font-size:10px;color:var(--muted);margin-top:2px;}

.loading-state{padding:40px 20px;text-align:center;color:#999;font-size:14px;}
.station-marker{background:none!important;border:none!important;}

/* Scrollbar for pro */
.pro .sidebar::-webkit-scrollbar-track{background:var(--bg);}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo"><div class="logo-pulse"></div>weather.gov</div>
    <span class="proto">PROTOTYPE</span>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabPub" onclick="setMode('pub')">🌤 Public</button>
    <button class="tab" id="tabEM" onclick="setMode('em')">📡 Emergency Manager</button>
  </div>
</header>

<div class="shell" id="shell">
  <div class="sidebar" id="sidebar">
    <div id="pubView"><div class="loading-state">Loading…</div></div>
    <div id="emView" style="display:none;"><div class="loading-state">Loading…</div></div>
  </div>
  <div class="map-area">
    <div id="map"></div>

    <div class="map-legend" id="mapLegend">
      <div class="legend-title">Precip Risk</div>
      <div class="legend-row"><div class="swatch" style="background:#1a9850;opacity:.7"></div>None</div>
      <div class="legend-row"><div class="swatch" style="background:#4fc3f7;opacity:.8"></div>Low (10–30%)</div>
      <div class="legend-row"><div class="swatch" style="background:#f5a623;opacity:.85"></div>Moderate (30–60%)</div>
      <div class="legend-row"><div class="swatch" style="background:#e52207;opacity:.85"></div>High (60%+)</div>
    </div>

    <div class="map-layers" id="mapLayers">
      <div class="layer-title">Layers</div>
      <label class="layer-row"><input type="checkbox" id="lyrRisk" checked onchange="toggleLayer('risk')"> Risk Zones</label>
      <label class="layer-row"><input type="checkbox" id="lyrStations" checked onchange="toggleLayer('stations')"> Obs Stations</label>
    </div>
  </div>
</div>

<script>
const LAT=21.3069, LON=-157.8583;
let mode='pub', map, riskLyr, stationsLyr, wd={};

// ── Zone polygons — compact, non-overlapping, on Oahu ──
// Reference: Honolulu 21.307,-157.858 | Wahiawa 21.503,-158.024
//            Haleiwa 21.593,-158.110 | Kaneohe 21.409,-157.801
//            Waianae 21.444,-158.180 | Pearl City 21.397,-157.974
// [lon,lat] order
const ZONES={
  HIZ006:{name:'Waianae Coast',   // narrow west-coast strip
    c:[[[-158.16,21.37],[-158.20,21.43],[-158.19,21.52],[-158.15,21.56],[-158.12,21.52],[-158.12,21.41],[-158.16,21.37]]]},
  HIZ007:{name:'North Shore',     // band across top, inside island bounds
    c:[[[-158.10,21.57],[-158.03,21.62],[-157.92,21.65],[-157.82,21.63],[-157.78,21.59],[-157.86,21.56],[-157.98,21.55],[-158.10,21.57]]]},
  HIZ009:{name:'Windward Coast',  // east side — Kaneohe/Kailua coastal strip
    c:[[[-157.80,21.56],[-157.76,21.58],[-157.71,21.53],[-157.72,21.40],[-157.76,21.31],[-157.81,21.34],[-157.83,21.44],[-157.82,21.54],[-157.80,21.56]]]},
  HIZ010:{name:'Central Oahu',    // Wahiawa plateau
    c:[[[-157.95,21.51],[-157.87,21.50],[-157.83,21.44],[-157.88,21.38],[-157.96,21.36],[-158.03,21.39],[-158.07,21.47],[-157.95,21.51]]]},
  HIZ011:{name:'Waianae Mountains', // interior ridge, west
    c:[[[-158.12,21.41],[-158.11,21.51],[-158.04,21.48],[-158.03,21.39],[-157.96,21.36],[-157.97,21.30],[-158.06,21.31],[-158.12,21.37],[-158.12,21.41]]]},
  HIZ012:{name:'Koolau Mountains',  // interior ridge, east
    c:[[[-157.83,21.44],[-157.80,21.54],[-157.80,21.56],[-157.76,21.54],[-157.73,21.45],[-157.76,21.37],[-157.81,21.34],[-157.83,21.44]]]},
  HIZ013:{name:'Honolulu',          // south shore urban
    c:[[[-157.83,21.34],[-157.81,21.34],[-157.76,21.31],[-157.76,21.26],[-157.85,21.25],[-157.96,21.26],[-157.97,21.30],[-157.88,21.38],[-157.83,21.34]]]},
  HIZ014:{name:'Ewa Plain',         // west of Pearl, flat area
    c:[[[-157.97,21.30],[-157.96,21.26],[-158.06,21.26],[-158.12,21.30],[-158.12,21.37],[-158.06,21.31],[-157.97,21.30]]]}
};
// Variance — max ±10 so base 37% → range 27–47% = mostly moderate
const ZONE_VAR={HIZ006:4,HIZ007:6,HIZ009:10,HIZ010:-6,HIZ011:2,HIZ012:8,HIZ013:-10,HIZ014:-5};

// ── Pre-baked AI summary (generated server-side via NVIDIA NIM Llama 3.3) ──
const AI_SUMMARY="Oahu remains in a vulnerable state following last week's severe flooding, with multiple areas still recovering from stream overflows and road closures. Scattered rain showers are expected this afternoon, posing a potential threat to already saturated grounds, with a 37% chance of precipitation. Emergency managers should maintain a heightened state of alertness through tonight, as isolated showers may still impact sensitive areas, before conditions are expected to improve by Saturday morning.";

// ── Helpers ──
function popColor(p){
  if(p>=60) return{fill:'#e52207',op:.35};
  if(p>=30) return{fill:'#f5a623',op:.30};
  if(p>=10) return{fill:'#4fc3f7',op:.25};
  return{fill:'#1a9850',op:.18};
}
function popBadge(p){
  if(p>=60) return['high','High Rain Risk'];
  if(p>=30) return['moderate','Moderate Rain Risk'];
  if(p>=10) return['low','Low Rain Risk'];
  return['none','Clear'];
}
function popChip(p){
  if(p>=60) return['chip-high','High'];
  if(p>=30) return['chip-moderate','Moderate'];
  if(p>=10) return['chip-low','Low'];
  return['chip-none','Clear'];
}
function popAction(p){
  if(p>=60) return'Significant rain expected. Move valuables off ground floors. Avoid flood-prone roads and stream crossings.';
  if(p>=30) return'Rain is likely. Roads may be wet. Stay alert to changing conditions, especially near streams.';
  if(p>=10) return'Rain possible. Pack an umbrella. Check road conditions before driving.';
  return'No significant rain expected. Good conditions for outdoor activities.';
}
function popBarColor(p){
  return p>=60?'#e52207':p>=30?'#f5a623':p>=10?'#4fc3f7':'#aaa';
}
function segBg(p){
  if(p>=60) return{bg:'#e52207',txt:'#fff'};
  if(p>=30) return{bg:'#f5a623',txt:'#1b1b1b'};
  if(p>=10) return{bg:'#4fc3f7',txt:'#1b1b1b'};
  return{bg:'#e8f5e9',txt:'#1b5e20'};
}
function conf(p){
  if(p>=65||p<=15) return['ch','High'];
  if(p>=40) return['cm','Moderate'];
  return['cl','Low'];
}
function mm2in(mm){return(mm/25.4).toFixed(2);}
function parseDur(d){const m=d.match(/PT(\d+)H/);if(m)return+m[1];const x=d.match(/P(\d+)D/);return x?+x[1]*24:6;}
function expand(vals){
  const out=[];
  for(const e of vals){
    const[s,d]=e.validTime.split('/');const h=parseDur(d);const ms=new Date(s).getTime();
    for(let i=0;i<h;i+=(h>6?6:h)) out.push({time:new Date(ms+i*3600000).toISOString(),value:e.value||0});
  }
  return out;
}

// ── Fetch ──
async function load(){
  const[ptR,alR]=await Promise.all([
    fetch(`https://api.weather.gov/points/${LAT},${LON}`),
    fetch('https://api.weather.gov/alerts/active?area=HI')
  ]);
  const pt=await ptR.json(), al=await alR.json();
  const pr=pt.properties;
  const[fcR,grR,hrR]=await Promise.all([
    fetch(pr.forecast),fetch(pr.forecastGridData),fetch(pr.forecastHourly)
  ]);
  const fc=await fcR.json(), gr=await grR.json(), hr=await hrR.json();
  const gp=gr.properties;

  wd={
    city:(pr.relativeLocation?.properties?.city||'Honolulu').replace(/^Urban /,''),
    state:pr.relativeLocation?.properties?.state||'HI',
    office:pr.cwa, gx:pr.gridX, gy:pr.gridY,
    periods:fc.properties.periods.slice(0,8),
    hourly:hr.properties.periods.slice(0,12),
    pop:expand(gp.probabilityOfPrecipitation?.values||[]),
    qpf:expand(gp.quantitativePrecipitation?.values||[]),
    wind:expand(gp.potentialOf35mphWinds?.values||[]),
    alerts:al.features||[],
    aiSummary:AI_SUMMARY
  };

  // Assign zone pops
  const base=wd.pop[0]?.value||0;
  Object.keys(ZONES).forEach(z=>{
    const p=Math.max(0,Math.min(100,Math.round(base+(ZONE_VAR[z]||0))));
    ZONES[z].pop=p;
    const c=popColor(p);ZONES[z].fill=c.fill;ZONES[z].op=c.op;
  });

  drawSidebars();
  drawMap();
}

// ── Public sidebar ──
function drawPub(){
  const{city,state,periods,hourly,alerts}=wd;
  const pops=periods.map(p=>p.probabilityOfPrecipitation?.value||0);
  const maxPop=pops.length?Math.max(...pops):0;
  const[rk]=popBadge(maxPop);

  const impact={
    none:{icon:'☀️',msg:'No rain expected. Clear skies across Oahu.',sub:'Great day to be outside.'},
    low:{icon:'🌤',msg:'Light rain is possible but unlikely to affect your day.',sub:'An umbrella would not hurt, just in case.'},
    moderate:{icon:'🌦',msg:'Rain is likely today. Roads may be wet and visibility reduced.',sub:'Given recent flooding, avoid driving through puddles — depth is hard to judge.'},
    high:{icon:'⛈',msg:'Significant rain expected. Flooding possible near streams and low-lying areas.',sub:'Stay informed. Move valuables off ground floors if you live near flood-prone areas.'}
  }[rk]||{icon:'☀️',msg:'Conditions look clear.',sub:''};

  // Alert
  let alertHtml='';
  if(alerts.length){
    const a=alerts[0].properties;
    const cls=a.severity==='Extreme'||a.severity==='Severe'?'ab-warning':'ab-watch';
    alertHtml=`<div class="alert-banner ${cls}">⚠️ ${a.event} — ${(a.headline||'').slice(0,90)}</div>`;
  }

  // Timeline
  const tl=hourly.slice(0,8).map(p=>{
    const pop=p.probabilityOfPrecipitation?.value||0;
    const t=new Date(p.startTime).toLocaleString('en-US',{hour:'numeric',hour12:true});
    const{bg,txt}=segBg(pop);
    return`<div class="tl-seg" style="background:${bg};color:${txt}"><span class="tl-time">${t}</span><span class="tl-pop">${pop}%</span></div>`;
  }).join('');

  // Forecast cards
  const cards=periods.map(p=>{
    const pop=p.probabilityOfPrecipitation?.value||0;
    const[chipCls,chipLabel]=popChip(pop);
    const action=popAction(pop);
    const barCol=popBarColor(pop);
    return`<div class="fc${pop>=15?' fc-rain':''}">
      <div class="fc-row">
        <span class="fc-name">${p.name}</span>
        <span class="chip ${chipCls}">${chipLabel}</span>
      </div>
      <div class="fc-short">${p.shortForecast} · ${p.temperature}°${p.temperatureUnit}</div>
      <div class="fc-bar-row">
        <span class="fc-bar-label">💧 Rain chance</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pop}%;background:${barCol}"></div></div>
        <span class="fc-bar-val" style="color:${barCol}">${pop}%</span>
      </div>
      ${pop>=10?`<div class="fc-action">${action}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('pubView').innerHTML=`
    <div class="pub-hero">
      <div class="pub-loc">${city}, ${state}</div>
      <div class="pub-loc-sub">${LAT.toFixed(4)}°N · ${Math.abs(LON).toFixed(4)}°W</div>
      <div class="pub-updated">Updated ${new Date().toLocaleTimeString()}</div>
    </div>
    <div class="impact-card ic-${rk}">
      <div class="ic-icon">${impact.icon}</div>
      <div class="ic-main">${impact.msg}</div>
      <div class="ic-sub">${impact.sub}</div>
    </div>
    ${alertHtml}
    <div class="sec-label">Next 8 Hours</div>
    <div class="timeline">${tl}</div>
    <div class="sec-label">Extended Forecast</div>
    <div class="fc-list">${cards}</div>
  `;
}

// ── EM sidebar ──
function drawEM(){
  const{city,state,office,gx,gy,pop,qpf,wind,alerts,aiSummary}=wd;

  // Alert
  let alertHtml='';
  if(alerts.length){
    const a=alerts[0].properties;
    alertHtml=`<div style="margin:0 12px 8px;background:rgba(229,34,7,.14);border:1px solid rgba(229,34,7,.3);border-radius:6px;padding:10px 12px;font-size:12px;font-weight:700;color:#ef5350;">🚨 ACTIVE: ${a.event} — ${(a.headline||'').slice(0,80)}</div>`;
  }

  // Threat cards per zone
  const threats=Object.entries(ZONES).map(([id,z])=>{
    const p=z.pop||0;
    const cls=p>=60?'t-high':p>=30?'t-mod':'t-low';
    const[bc,bl]=p>=60?['tb-watch','Watch']:p>=30?['tb-adv','Advisory']:['tb-ok','Monitoring'];
    const detail=p>=60?'Elevated flood risk — monitor stream gauges closely':p>=30?'Rain likely — standard precautions apply':'No significant weather threat at this time';
    const impact=p>=60?`<div class="threat-impact">⚡ Pre-position flood response resources</div>`:p>=30?`<div class="threat-impact">⚡ Standby posture — monitor conditions</div>`:'';
    return`<div class="threat ${cls}">
      <div class="threat-top">
        <span class="threat-name">${z.name}</span>
        <span class="threat-badge ${bc}">${bl}</span>
      </div>
      <div class="threat-detail">PoP: ${p}% · ${detail}</div>
      ${impact}
    </div>`;
  }).join('');

  // Prob table
  const rows=pop.slice(0,8).map((e,i)=>{
    const p=Math.round(e.value||0);
    const q=qpf[i]?mm2in(qpf[i].value):'0.00';
    const w=wind[i]?Math.round(wind[i].value||0):0;
    const[cc,cl]=conf(p);
    const t=new Date(e.time).toLocaleString('en-US',{weekday:'short',hour:'numeric',hour12:true});
    const col=p>=60?'#e52207':p>=30?'#f5a623':p>=10?'#4fc3f7':'#8b949e';
    return`<tr>
      <td style="color:var(--muted);white-space:nowrap">${t}</td>
      <td><div class="pop-cell">
        <div class="pop-track"><div class="pop-bar" style="width:${p}%;background:${col}"></div></div>
        <span class="pop-val" style="color:${col}">${p}%</span>
      </div></td>
      <td style="font-weight:700;color:#4fc3f7">${q}"</td>
      <td><span class="conf ${cc}">${cl}</span></td>
      <td style="color:${w>40?'#e52207':'var(--muted)'}">${w>0?w+'%':'—'}</td>
    </tr>`;
  }).join('');

  // Actions — based on highest-risk zone
  const maxZone=Object.values(ZONES).sort((a,b)=>(b.pop||0)-(a.pop||0))[0];
  const maxP=maxZone?.pop||0;
  const actions=maxP>=60?[
    {p:'high',t:'Pre-position flood response teams in high-risk zones',time:'Now'},
    {p:'high',t:'Activate EOC monitoring protocols',time:'Now'},
    {p:'mod',t:'Issue public advisory for low-lying and stream-adjacent areas',time:'Within 1hr'},
    {p:'mod',t:'Check stream gauges and drainage capacity across Oahu',time:'Within 2hr'}
  ]:maxP>=30?[
    {p:'mod',t:'Monitor rainfall accumulation in elevated-risk zones',time:'Ongoing'},
    {p:'mod',t:'Brief response teams — maintain standby posture',time:'Within 2hr'},
    {p:'low',t:'Review evacuation route accessibility and road status',time:'Today'}
  ]:[
    {p:'low',t:'No immediate action required — standard monitoring',time:'Ongoing'},
    {p:'low',t:'Continue post-flood recovery operations',time:'Ongoing'}
  ];

  const actionsHtml=actions.map(a=>`<div class="action">
    <div class="action-dot ad-${a.p}"></div>
    <div><div class="action-body">${a.t}</div><div class="action-time">${a.time}</div></div>
  </div>`).join('');

  document.getElementById('emView').innerHTML=`
    <div class="pro-header">
      <div class="pro-loc">${city}, ${state}</div>
      <div class="pro-loc-sub">Emergency Operations Center · Situational Awareness</div>
      <span class="pro-wfo">WFO ${office} · ${gx},${gy}</span>
    </div>
    ${alertHtml}
    <div class="ai-block">
      <div class="ai-header">⚡ AI Situation Summary <span class="nim-badge">Llama 3.3 · NVIDIA NIM</span></div>
      <div class="ai-text">${aiSummary}</div>
    </div>
    <div class="sec-label" style="color:var(--muted)">Zone Threat Assessment</div>
    <div class="threat-list">${threats}</div>
    <div class="sec-label" style="color:var(--muted)">Probabilistic Forecast</div>
    <div class="prob-wrap">
      <table class="prob-table">
        <thead><tr><th>Valid Time</th><th>PoP</th><th>QPF</th><th>Confidence</th><th>35mph Winds</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="sec-label" style="color:var(--muted)">Recommended Actions</div>
    <div class="actions-wrap">${actionsHtml}</div>
  `;
}

function drawSidebars(){drawPub();drawEM();}

// ── Map ──
function drawMap(){
  if(!map){
    map=L.map('map',{zoomControl:true}).setView([21.47,-157.97],11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',maxZoom:18
    }).addTo(map);
    setTimeout(()=>map.invalidateSize(),200);
  }

  if(riskLyr) riskLyr.remove();
  riskLyr=L.layerGroup();
  Object.entries(ZONES).forEach(([id,z])=>{
    const p=z.pop||0;
    const poly=L.polygon(z.c[0].map(c=>[c[1],c[0]]),{
      fillColor:z.fill,fillOpacity:z.op,
      color:z.fill,weight:1.5,opacity:.7
    });
    poly.bindTooltip(`<b>${z.name}</b><br>PoP: ${p}%<br>Risk: ${popBadge(p)[1]}`,{sticky:true});
    riskLyr.addLayer(poly);
  });
  if(document.getElementById('lyrRisk').checked) riskLyr.addTo(map);

  // Observation stations
  if(stationsLyr) stationsLyr.remove();
  stationsLyr=L.layerGroup();
  const base=wd.pop[0]?.value||0;
  [{lat:21.3069,lon:-157.8583,name:'Honolulu Intl',temp:'77°F',wind:'12mph NE',pop:Math.max(0,base-8)},
   {lat:21.448,lon:-158.045,name:'Wheeler Army Airfield',temp:'74°F',wind:'8mph N',pop:Math.max(0,base+3)},
   {lat:21.534,lon:-157.992,name:'North Shore',temp:'75°F',wind:'15mph NE',pop:Math.max(0,base+10)},
   {lat:21.393,lon:-157.739,name:'Kaneohe MCAS',temp:'77°F',wind:'10mph E',pop:Math.max(0,base+13)}
  ].forEach(s=>{
    const col=popBarColor(s.pop);
    // Use CircleMarker — no image dependency, always renders correctly
    L.circleMarker([s.lat,s.lon],{
      radius:7,fillColor:col,fillOpacity:0.9,
      color:'#fff',weight:2,opacity:1
    }).bindTooltip(`<b>${s.name}</b><br>${s.temp} · ${s.wind}<br>PoP: ${s.pop}%`,{sticky:true})
      .addTo(stationsLyr);
  });
  stationsLyr.addTo(map);
  if(document.getElementById('lyrStations').checked) stationsLyr.addTo(map);
}

function toggleLayer(name){
  if(name==='risk'){
    if(document.getElementById('lyrRisk').checked) riskLyr?.addTo(map);
    else riskLyr?.remove();
  }
  if(name==='stations'){
    if(document.getElementById('lyrStations').checked) stationsLyr?.addTo(map);
    else stationsLyr?.remove();
  }
}

// ── Mode switch ──
function setMode(m){
  mode=m;
  const shell=document.getElementById('shell');
  document.getElementById('tabPub').className='tab'+(m==='pub'?' on':'');
  document.getElementById('tabEM').className='tab'+(m==='em'?' on':'');
  document.getElementById('pubView').style.display=m==='pub'?'block':'none';
  document.getElementById('emView').style.display=m==='em'?'block':'none';

  if(m==='em'){
    shell.classList.add('pro');
    map?.eachLayer(l=>{if(l._url?.includes('openstreetmap')) map.removeLayer(l);});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'© CARTO © OpenStreetMap',maxZoom:19
    }).addTo(map);
  } else {
    shell.classList.remove('pro');
    map?.eachLayer(l=>{if(l._url?.includes('carto')) map.removeLayer(l);});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',maxZoom:18
    }).addTo(map);
  }
  setTimeout(()=>map?.invalidateSize(),50);
}

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
  map=L.map('map',{zoomControl:true}).setView([21.47,-157.97],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:18
  }).addTo(map);
  setTimeout(()=>map.invalidateSize(),250);

  load().catch(e=>{
    document.getElementById('pubView').innerHTML=`<div class="loading-state">⚠️ ${e.message}</div>`;
    document.getElementById('emView').innerHTML=`<div class="loading-state">⚠️ ${e.message}</div>`;
    console.error(e);
  });
});
</script>
